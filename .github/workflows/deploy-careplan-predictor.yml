name: Deploy Careplan Predictor Function

on:
  push:
    branches: ["main"]
    paths:
      - "functions/careplan-predictor/**"

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTION_APP_NAME: "careplan-predictor-func"
  PYTHON_VERSION: "3.11"
  FUNCTION_PATH: "functions/careplan-predictor"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.FUNCTION_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP_NAME }}
          package: ${{ env.FUNCTION_PATH }}
